<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 실습 가이드</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--brand:#4f46e5;--brand-light:#eef2ff;--bg:#f8fafc;--card:#fff;--code-bg:#0f172a;--code-text:#e2e8f0;--success:#16a34a;--success-bg:#f0fdf4;--success-border:#bbf7d0;--fail:#dc2626;--fail-bg:#fef2f2;--fail-border:#fecaca;--text:#1e293b;--muted:#64748b;--border:#e2e8f0;--radius:10px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
.progress-bar-wrap{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.progress-track{flex:1;min-width:200px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--brand);border-radius:4px;transition:width .3s}
.progress-text{font-size:13px;color:var(--muted);white-space:nowrap}
.step-select{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:var(--card);color:var(--text);cursor:pointer}
.main{flex:1;display:flex;max-width:1400px;width:100%;margin:0 auto;padding:24px;gap:24px}
.panel{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.left-panel{flex:1;min-width:0;display:flex;flex-direction:column}
.right-panel{flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto;max-height:calc(100vh - 140px)}
.panel-header{padding:14px 20px;background:var(--brand-light);border-bottom:1px solid var(--border);font-weight:600;font-size:15px;color:var(--brand)}
.panel-body{padding:20px;flex:1;overflow-y:auto}
.terminal{background:var(--code-bg);border-radius:8px;padding:0;font-family:"Cascadia Code","Fira Code","Consolas",monospace;font-size:13px;color:var(--code-text);overflow:hidden}
.terminal-bar{display:flex;align-items:center;gap:6px;padding:10px 14px;background:rgba(255,255,255,.06)}
.terminal-dot{width:10px;height:10px;border-radius:50%}
.terminal-dot.r{background:#ef4444}.terminal-dot.y{background:#eab308}.terminal-dot.g{background:#22c55e}
.terminal-bar span{margin-left:8px;font-size:12px;color:#94a3b8}
.terminal-body{padding:14px 18px;line-height:1.7;white-space:pre-wrap;word-break:break-all}
.terminal-body .prompt{color:#818cf8}.terminal-body .output{color:#a5f3fc}.terminal-body .comment{color:#64748b}
.file-preview{background:#fefefe;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.file-preview-bar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#f1f5f9;border-bottom:1px solid var(--border);font-size:12px;color:var(--muted)}
.file-preview-bar .icon{font-size:14px}
.file-preview-body{padding:16px 18px;font-size:13px;line-height:1.8;color:var(--text)}
.file-preview-body h3{font-size:15px;font-weight:700;margin:0 0 8px;color:var(--text)}
.file-preview-body table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.file-preview-body th,.file-preview-body td{padding:6px 10px;border:1px solid var(--border);text-align:left}
.file-preview-body th{background:var(--brand-light);color:var(--brand);font-weight:600}
.dashboard-mock{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:20px;display:flex;flex-direction:column;gap:16px}
.chart-bar-group{display:flex;align-items:flex-end;gap:12px;height:120px;padding:0 10px}
.chart-bar{flex:1;background:var(--brand);border-radius:4px 4px 0 0;min-width:30px;position:relative;transition:height .3s}
.chart-bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--muted);white-space:nowrap}
.chart-bar-val{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text);font-weight:600}
.pie-wrap{display:flex;align-items:center;gap:16px}
.pie-svg{width:100px;height:100px}
.pie-legend{font-size:12px;line-height:2}
.pie-legend span{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
.code-block-wrap{position:relative;margin:10px 0}
.code-block{background:var(--code-bg);color:var(--code-text);padding:14px 16px;border-radius:8px;font-family:"Cascadia Code","Fira Code","Consolas",monospace;font-size:13px;line-height:1.6;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.copy-btn{position:absolute;top:8px;right:8px;background:rgba(255,255,255,.1);border:none;color:#94a3b8;font-size:12px;padding:4px 10px;border-radius:4px;cursor:pointer;transition:background .2s}
.copy-btn:hover{background:rgba(255,255,255,.2);color:#fff}
.copy-btn.copied{color:#22c55e}
.box{border-radius:8px;padding:14px 16px;margin:10px 0;font-size:13px;line-height:1.6}
.box-success{background:var(--success-bg);border:1px solid var(--success-border)}
.box-success .box-title{color:var(--success);font-weight:700;margin-bottom:4px}
.box-fail{background:var(--fail-bg);border:1px solid var(--fail-border)}
.box-fail .box-title{color:var(--fail);font-weight:700;margin-bottom:4px}
.desc{font-size:14px;line-height:1.8;margin-bottom:12px}
.desc ul{padding-left:20px;margin:6px 0}
.desc li{margin:4px 0}
.section-title{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text)}
.completion-area{margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.check-label{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;cursor:pointer;user-select:none}
.check-label input[type=checkbox]{width:18px;height:18px;accent-color:var(--brand)}
.memo-area{margin-top:12px}
.memo-area label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
.memo-area textarea{width:100%;min-height:70px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;background:var(--bg)}
.memo-area textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.bottom-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--card);border-top:1px solid var(--border);flex-wrap:wrap;gap:8px}
.nav-btn{padding:10px 22px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:var(--card);color:var(--text);transition:all .15s}
.nav-btn:hover{border-color:var(--brand);color:var(--brand)}
.nav-btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
.nav-btn.primary:hover{background:#4338ca}
.nav-btn:disabled{opacity:.4;cursor:default}
.page-info{font-size:13px;color:var(--muted);text-align:center}
.page-info small{display:block;font-size:11px;margin-top:2px}
.export-wrap{text-align:center;padding:12px 0}
.export-btn{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;background:var(--brand);color:#fff;transition:background .15s}
.export-btn:hover{background:#4338ca}
@media(max-width:768px){
  .main{flex-direction:column;padding:12px}
  .left-panel,.right-panel{flex:none;max-height:none}
  .right-panel{max-height:none}
  .progress-bar-wrap{padding:10px 14px;gap:10px}
  .bottom-nav{padding:10px 14px}
}
</style>
</head>
<body>
<script>
(function(){
  var expire = new Date('2026-05-28T00:00:00+09:00');

<div class="progress-bar-wrap">
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <span class="progress-text" id="progressText">0 / 14</span>
  <select class="step-select" id="stepSelect"></select>
</div>

<div class="main">
  <div class="panel left-panel">
    <div class="panel-header" id="leftHeader">미리보기</div>
    <div class="panel-body" id="leftBody"></div>
  </div>
  <div class="panel right-panel">
    <div class="panel-header" id="rightHeader">설명</div>
    <div class="panel-body" id="rightBody"></div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-btn" id="prevBtn" onclick="go(-1)">이전</button>
  <div class="page-info">
    <span id="pageCounter">1 / 14</span>
    <small>← → 키로 넘기기</small>
  </div>
  <button class="nav-btn primary" id="nextBtn" onclick="go(1)">다음</button>

<div class="export-wrap">
  <button class="export-btn" onclick="exportMemos()">📤 내 메모 모두 텍스트로 다운로드</button>
</div>

<div class="desc">또는 직접 Dooray에서 태스크를 생성해도 됩니다.</div>

let cur=0;

function terminal(title,lines){
  const body=lines.map(l=>{
    if(l.type==="prompt")return`<span class="prompt">${esc(l.text)}</span>`;
    if(l.type==="comment")return`<span class="comment">${esc(l.text)}</span>`;
    return`<span class="output">${esc(l.text)}</span>`;
  }).join("\n");
  return`<div class="terminal"><div class="terminal-bar"><span class="terminal-dot r"></span><span class="terminal-dot y"></span><span class="terminal-dot g"></span><span>${esc(title)}</span></div><div class="terminal-body">${body}</div></div>`;
}

function filePreview(name,html){
  return`<div class="file-preview"><div class="file-preview-bar"><span class="icon">📄</span>${esc(name)}</div><div class="file-preview-body">${html}</div></div>`;
}

function codeBlock(code){
  const id="cb"+Math.random().toString(36).slice(2,8);
  return`<div class="code-block-wrap"><div class="code-block" id="${id}">${esc(code)}</div><button class="copy-btn" onclick="copyCode('${id}',this)">📋 복사</button></div>`;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function copyCode(id,btn){
  const text=document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent="✅ 복사됨";btn.classList.add("copied");
    setTimeout(()=>{btn.textContent="📋 복사";btn.classList.remove("copied")},1500);
  });
}

function render(){
  const s=STEPS[cur];
  document.getElementById("leftHeader").textContent=`Step ${s.id} 미리보기`;
  document.getElementById("leftBody").innerHTML=s.left();
  document.getElementById("rightHeader").textContent=`Step ${s.id}: ${s.title}`;

  const chk=loadCheck(s.id);
  const memo=loadMemo(s.id);
  document.getElementById("rightBody").innerHTML=s.right()+`
<div class="completion-area">
  <label class="check-label"><input type="checkbox" id="chk${s.id}" ${chk?"checked":""} onchange="saveCheck(${s.id},this.checked)"> 이 단계 완료</label>
  <div class="memo-area">
    <label>📝 메모</label>
    <textarea id="memo${s.id}" oninput="saveMemo(${s.id},this.value)" placeholder="이 단계에서 메모할 내용을 적어주세요...">${esc(memo)}</textarea>
  </div>
</div>`;

  document.getElementById("prevBtn").disabled=cur===0;
  document.getElementById("nextBtn").disabled=cur===STEPS.length-1;
  document.getElementById("pageCounter").textContent=`${cur+1} / ${STEPS.length}`;
  document.getElementById("stepSelect").value=cur;
  updateProgress();
}

function updateProgress(){
  let done=0;
  STEPS.forEach(s=>{if(loadCheck(s.id))done++});
  const pct=Math.round(done/STEPS.length*100);
  document.getElementById("progressFill").style.width=pct+"%";
  document.getElementById("progressText").textContent=`${done} / ${STEPS.length} 완료`;
}

function go(d){
  const n=cur+d;
  if(n>=0&&n<STEPS.length){cur=n;render();window.scrollTo(0,0)}
}

function loadCheck(id){return localStorage.getItem("ccg_chk_"+id)==="1"}
function saveCheck(id,v){localStorage.setItem("ccg_chk_"+id,v?"1":"0");updateProgress()}
function loadMemo(id){return localStorage.getItem("ccg_memo_"+id)||""}
function saveMemo(id,v){localStorage.setItem("ccg_memo_"+id,v)}

function exportMemos(){
  let txt="Claude Code 수강 메모\n생성일: "+new Date().toLocaleString("ko-KR")+"\n\n";
  STEPS.forEach(s=>{
    const m=loadMemo(s.id);
    const c=loadCheck(s.id);
    txt+=`=== Step ${s.id}: ${s.title} ===${c?" [완료]":""}\n${m||"(메모 없음)"}\n\n`;
  });
  const blob=new Blob([txt],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="claude-code-수강메모.txt";
  a.click();
  URL.revokeObjectURL(a.href);
}

// init
const sel=document.getElementById("stepSelect");
STEPS.forEach((s,i)=>{
  const o=document.createElement("option");
  o.value=i;o.textContent=`Step ${s.id}: ${s.title}`;
  sel.appendChild(o);
});
sel.addEventListener("change",e=>{cur=parseInt(e.target.value);render()});

document.addEventListener("keydown",e=>{
  if(e.target.tagName==="TEXTAREA"||e.target.tagName==="INPUT")return;
  if(e.key==="ArrowLeft")go(-1);
  if(e.key==="ArrowRight")go(1);
});

render();
</script>
</body>
</html>
