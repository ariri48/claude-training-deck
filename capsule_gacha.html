<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎰 AI 캡슐 가챠</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard',system-ui,sans-serif;background:linear-gradient(135deg,#0f172a,#1e1b4b);color:#fff;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:16px;}

  h1{font-size:36px;font-weight:800;text-align:center;margin-bottom:4px;}
  .sub{font-size:15px;color:#a5b4fc;text-align:center;margin-bottom:20px;}

  /* 가챠 머신 */
  .machine{position:relative;width:200px;height:200px;margin:0 auto;}
  .capsule-display{width:180px;height:180px;margin:0 auto;border-radius:50%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.15),transparent);border:4px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:80px;transition:transform .3s;}
  .capsule-display.spin{animation:spin 1.5s cubic-bezier(.25,.1,.25,1);}
  @keyframes spin{0%{transform:rotate(0)}50%{transform:rotate(720deg) scale(.7)}100%{transform:rotate(1440deg) scale(1)}}

  /* 결과 카드 */
  .result{display:none;text-align:center;margin-top:12px;animation:popIn .5s ease;}
  .result.show{display:block;}
  @keyframes popIn{0%{opacity:0;transform:scale(.5)}100%{opacity:1;transform:scale(1)}}
  .result-card{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:2px solid rgba(255,255,255,.2);border-radius:20px;padding:20px;max-width:440px;margin:0 auto;}
  .result-name{font-size:28px;font-weight:800;margin-top:8px;}
  .result-dept{font-size:14px;color:#a5b4fc;margin-top:2px;}
  .result-msg{font-size:13px;color:#e0e7ff;margin-top:12px;line-height:1.6;text-align:left;background:rgba(255,255,255,.05);padding:12px;border-radius:10px;}
  .result-label{font-size:12px;color:#94a3b8;margin-top:4px;}

  /* 버튼 */
  .btn{display:inline-block;padding:12px 36px;font-size:18px;font-weight:700;border:none;border-radius:14px;cursor:pointer;transition:all .2s;font-family:inherit;}
  .btn-start{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;box-shadow:0 8px 32px rgba(245,158,11,.4);margin-top:16px;}
  .btn-start:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(245,158,11,.5);}
  .btn-start:active{transform:translateY(0);}
  .btn-next{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);margin-top:16px;font-size:16px;padding:12px 32px;}
  .btn-next:hover{background:rgba(255,255,255,.25);}
  .btn-reset{background:transparent;color:#64748b;border:1px solid #334155;margin-top:12px;font-size:14px;padding:8px 24px;}

  /* 컨페티 */
  .confetti{position:fixed;top:-10px;width:10px;height:10px;border-radius:2px;animation:fall linear forwards;pointer-events:none;z-index:100;}
  @keyframes fall{to{top:110vh;transform:rotate(720deg);}}

  /* 카운터 */
  .counter{position:fixed;top:20px;right:24px;font-size:14px;color:#64748b;background:rgba(255,255,255,.05);padding:8px 16px;border-radius:12px;}

  /* 무지개 테두리 */
  .rainbow{animation:rainbow 2s linear infinite;}
  @keyframes rainbow{
    0%{border-color:#ef4444}14%{border-color:#f59e0b}28%{border-color:#eab308}
    42%{border-color:#22c55e}57%{border-color:#3b82f6}71%{border-color:#8b5cf6}
    85%{border-color:#ec4899}100%{border-color:#ef4444}
  }
</style>
</head>
<body>

<h1>🎰 AI 캡슐 가챠</h1>
<div class="sub">캡슐을 돌려 운명의 주인공을 뽑습니다!</div>

<div class="machine">
  <div class="capsule-display" id="capsule">🎰</div>
</div>

<div id="result" class="result">
  <div class="result-card">
    <div id="rank" style="font-size:32px;"></div>
    <div class="result-name" id="rName"></div>
    <div class="result-dept" id="rDept"></div>
    <div id="rPrize" style="margin-top:12px;font-size:18px;font-weight:700;color:#fde047;"></div>
    <div class="result-msg">
      <div class="result-label">💬 AI 사용 첫 성공담</div>
      <div id="rSuccess" style="margin-top:4px;"></div>
      <div class="result-label" style="margin-top:12px;">✉️ 강사·동료에게 한마디</div>
      <div id="rMessage" style="margin-top:4px;"></div>
    </div>
  </div>
</div>

<button class="btn btn-start" id="btnStart" onclick="draw()">🎰 추첨 시작</button>
<button class="btn btn-next" id="btnNext" onclick="draw()" style="display:none;">다음 추첨 →</button>
<button class="btn btn-reset" id="btnReset" onclick="resetAll()" style="display:none;">🔄 전체 초기화</button>

<div class="counter" id="counter"></div>

<script>
const PALETTE = ['#ef4444','#f59e0b','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#10b981'];
const RANKS = [
  {label:'🎁 당첨 3', prize:'사내에 N명 이상 전파하고 공유하기'},
  {label:'📬 당첨 2', prize:'1개월 뒤 결과 보고 독촉 메일 받기'},
  {label:'🎤 당첨 1', prize:'지금 나와서 오늘 교육 소감발표!'}
];

// ★ 이 배열을 Claude Code가 갈아끼웁니다 ★
const capsules = [
  {name:"이강성", dept:"사옥관리팀", success:"안녕하세요!", message:"어려워요 ㅠㅠㅠ", color:"#ef4444"},
  {name:"이득휴", dept:"사옥관리팀", success:"드디어 설치프로그램을 성공했습니다 ㅠㅠ", message:"원래 이렇게 진입하기까지 장벽이 높나요.......", color:"#f59e0b"},
  {name:"유제우", dept:"인프라보안", success:"활용할 데이터는 많지만 표현할 방법이 없었는데 이젠 활용 방안이 무궁무진해보입니다.", message:"정말 좋은 경험이였습니다.", color:"#22c55e"},
  {name:"정헌영", dept:"인프라보안팀", success:"설치 완료! 이제부터 시작", message:"덕분에 claude에 쉽게 접근하게 됐네요. 감사해요", color:"#3b82f6"},
  {name:"김도현", dept:"파트너지원팀", success:"실무에서 한번 적용해보겠습니다!", message:"정유경 전임님 화이팅!!", color:"#8b5cf6"},
  {name:"양아름솔", dept:"마케팅디자인", success:"정말 그동안은 반쪽만 사용하고 있었던거 같네요.", message:"생각보다 진입의 장벽이 높네요!", color:"#ec4899"},
  {name:"한보원", dept:"인사기타", success:"설치는 어려웠지만 두레이 연결하여 엑셀 분석까지 진행하였습니다", message:"옆자리 동료님 같이 힘냈습니다 멋져요", color:"#06b6d4"},
  {name:"이화주", dept:"BX팀", success:"말로만 듣던 '딸깍'이 무엇인지 체험할 수 있습니다.", message:"클로드 정말 막연했는데 덕분에 많이 알아갑니다. 감사합니다!", color:"#10b981"},
  {name:"양지선", dept:"인사_기타", success:"첫 시작이 어려웠지만 신기하네요. 더 사용해봐야겠어요", message:"다들 파이팅 입니다 ^^", color:"#ef4444"},
  {name:"이정현", dept:"구매팀", success:"익숙해지면 유용한 업무툴 일것 같아요", message:"긴시간 친절하게 설명해주셔서 고맙습니다.", color:"#f59e0b"},
  {name:"김지원", dept:"구매팀", success:"claude code 열심히 활용해 보겠습니다. 감사합니다.", message:"강사님 너무 고생 많으셨습니다! 감사합니다.", color:"#22c55e"},
  {name:"김은수", dept:"구매팀", success:"Claude에 대한 개념을 잡았습니다.", message:"비개발자들 대상으로 고생하셨습니다. 좀 어렵네요 ㅠㅠ", color:"#3b82f6"},
  {name:"박초연", dept:"경영관리팀", success:"Claude로 예쁘게 html 파일 만들어보니 이제 엑셀PPT 필요없을거같아요!", message:"클로드와 친해지기 어려웠는데 강사님 덕분에 조금 가까워진거 같아요.", color:"#8b5cf6"},
  {name:"한다희", dept:"사옥관리팀", success:"너무 어려워요 ㅠㅜㅜㅠㅜ", message:"열심히 공부 해 볼께요", color:"#ec4899"},
  {name:"라선", dept:"복리후생운영팀", success:"너무 어렵지만.. 이해하는데 조금은 도움이 되었습니다.^^", message:"수고하셨습니다 ㅎㅎ", color:"#06b6d4"},
  {name:"박근영", dept:"복리후생운영팀", success:"VS코드만 다뤄보고, 클로드 터미널 사용은 처음 해봤는데 조금 어렵지만 재밌었습니다. :)", message:"고생 많으셨습니다~~", color:"#10b981"},
  {name:"양세은", dept:"복리후생운영팀", success:"Claude Code를 처음으로 직접 다뤄본 뜻 깊은 시간이었습니다.", message:"강사님 감사합니다:) 복운팀 사랑해요!", color:"#ef4444"},
  {name:"윤봄이", dept:"P1아트파트", success:"Claud로 업무를 캘린더에 자동등록 하겠습니다!!! (성공하려 노력중...)", message:"오늘 너무 유익한강의 감사드립니다!!!!! 육아화이팅!!", color:"#f59e0b"},
  {name:"김영은", dept:"총무팀", success:"생소한 것이 많아서 너무 어렵네요 ㅠㅠ 그래도 열심히 이것저것 해볼게요", message:"강사님 고생 많으십니다 ㅠㅠ 감사합니다!", color:"#22c55e"},
  {name:"김덕찬", dept:"보안아키텍트팀", success:"이제 드디어 깔았습니다. 이녀석 얼마나 잘났는지 확인해보겠습니다. 인간은 망했나..?", message:"힘드네요... 옆사람과 똑같이 써도 각자 수행하는 방법이 다르니 힘드네요..ㅠㅠ", color:"#3b82f6"},
  {name:"안준호", dept:"인사_기타", success:"잘 못따라 갔지만 너무 유용합니다ㅡㅜ", message:"잘 이끌어주셔서 감사합니다", color:"#8b5cf6"},
  {name:"김미현", dept:"DHR팀", success:"문장 하나로 반복업무들을 처리할수 있어 좋았어요.", message:"배고프네요.", color:"#ec4899"},
];

let remaining = [...capsules];
let drawCount = 0;

function updateCounter(){
  document.getElementById('counter').textContent = `남은 캡슐: ${remaining.length} / ${capsules.length}`;
}

function fireConfetti(){
  const colors = PALETTE;
  for(let i=0;i<80;i++){
    const c = document.createElement('div');
    c.className='confetti';
    c.style.left = Math.random()*100+'vw';
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.width = (6+Math.random()*8)+'px';
    c.style.height = (6+Math.random()*8)+'px';
    c.style.animationDuration = (2+Math.random()*3)+'s';
    c.style.animationDelay = Math.random()*1.5+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 5000);
  }
}

function draw(){
  if(drawCount>=3){
    alert('추첨 완료! 당첨자 3명이 모두 나왔습니다 🎉');
    return;
  }
  if(remaining.length===0){
    alert('모든 캡슐을 뽑았습니다!');
    return;
  }

  const capsuleEl = document.getElementById('capsule');
  const resultEl = document.getElementById('result');
  const btnStart = document.getElementById('btnStart');
  const btnNext = document.getElementById('btnNext');
  const btnReset = document.getElementById('btnReset');

  // 숨기기
  resultEl.classList.remove('show');
  btnNext.style.display='none';

  // 스핀 애니메이션
  capsuleEl.classList.remove('spin');
  void capsuleEl.offsetWidth; // reflow
  capsuleEl.classList.add('spin');
  capsuleEl.classList.add('rainbow');
  capsuleEl.textContent = '🎁';

  setTimeout(()=>{
    // 랜덤 뽑기
    const idx = Math.floor(Math.random()*remaining.length);
    const picked = remaining.splice(idx, 1)[0];
    drawCount++;

    // 당첨 3 → 당첨 2 → 당첨 1 순서로 바로 3명
    const rankObj = RANKS[drawCount - 1];

    // 결과 표시
    capsuleEl.textContent = '🎊';
    capsuleEl.classList.remove('spin');
    document.getElementById('rank').textContent = rankObj.label;
    document.getElementById('rPrize').textContent = `🏆 ${rankObj.prize}`;
    document.getElementById('rName').textContent = picked.name;
    document.getElementById('rDept').textContent = picked.dept;
    document.getElementById('rSuccess').textContent = picked.success;
    document.getElementById('rMessage').textContent = picked.message;
    resultEl.classList.add('show');

    btnStart.style.display='none';
    btnNext.style.display='inline-block';
    btnReset.style.display='inline-block';
    updateCounter();
    fireConfetti();
  }, 1800);
}

function resetAll(){
  remaining = [...capsules];
  drawCount = 0;
  document.getElementById('capsule').textContent = '🎰';
  document.getElementById('capsule').classList.remove('spin','rainbow');
  document.getElementById('result').classList.remove('show');
  document.getElementById('btnStart').style.display='inline-block';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnReset').style.display='none';
  updateCounter();
}

updateCounter();
</script>
</body>
</html>
